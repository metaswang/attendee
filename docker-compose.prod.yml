services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: attendee-app
    restart: unless-stopped
    env_file:
      # Production control-plane env; DO snapshot workflow config stays separate.
      - deploy/production/myvps.env
    environment:
      DJANGO_SETTINGS_MODULE: attendee.settings.production
      ENABLE_CHROME_SANDBOX: "false"
      HOME: /home/app
      PYTHONUNBUFFERED: "1"
    volumes:
      # Keep GCP ADC outside HOME so PulseAudio can still create ~/.config/pulse.
      - /var/lib/attendee-gcloud:/var/lib/attendee-gcloud:ro
    command: >
      bash -lc "
      /opt/venv/bin/python manage.py collectstatic --noinput &&
      /opt/venv/bin/gunicorn attendee.wsgi:application
      --bind 0.0.0.0:8000
      --workers 3
      --timeout 120
      --access-logfile -
      --error-logfile -
      "
    expose:
      - "8000"

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: attendee-worker
    restart: unless-stopped
    env_file:
      - deploy/production/myvps.env
    environment:
      DJANGO_SETTINGS_MODULE: attendee.settings.production
      ENABLE_CHROME_SANDBOX: "false"
      HOME: /home/app
      PYTHONUNBUFFERED: "1"
    volumes:
      - /var/lib/attendee-gcloud:/var/lib/attendee-gcloud:ro
    command: /opt/venv/bin/celery -A attendee worker -l INFO

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: attendee-scheduler
    restart: unless-stopped
    env_file:
      - deploy/production/myvps.env
    environment:
      DJANGO_SETTINGS_MODULE: attendee.settings.production
      HOME: /home/app
      PYTHONUNBUFFERED: "1"
    volumes:
      - /var/lib/attendee-gcloud:/var/lib/attendee-gcloud:ro
    entrypoint: []
    command: /opt/venv/bin/python manage.py run_scheduler

  nginx:
    image: nginx:1.27-alpine
    container_name: attendee-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/meetbot.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/nginx/ssl:/etc/nginx/ssl:ro
