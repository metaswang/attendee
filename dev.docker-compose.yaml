services:
  attendee-worker-local:
    build: ./
    env_file:
      - .env
    volumes:
      - .:/attendee
    networks:
      - attendee_network
    environment:
      DJANGO_SETTINGS_MODULE: attendee.settings.development
      ENABLE_CHROME_SANDBOX: "false"
    command: "celery -A attendee worker -l INFO"

  attendee-scheduler-local:
    build: ./
    env_file:
      - .env
    volumes:
      - .:/attendee
    networks:
      - attendee_network
    environment:
      DJANGO_SETTINGS_MODULE: attendee.settings.development
    command: "python manage.py run_scheduler"
    entrypoint: []

  attendee-app-local:
    build: ./
    env_file:
      - .env
    volumes:
      - .:/attendee
    networks:
      - attendee_network
    ports:
      - "8000:8000"
    environment:
      DJANGO_SETTINGS_MODULE: attendee.settings.development
    command: >-
      sh -c "python manage.py migrate --noinput &&
      python manage.py runserver 0.0.0.0:8000"
    entrypoint: []

  attendee-webpage-streamer-local:
    build: ./
    env_file:
      - .env
    volumes:
      - .:/attendee
    networks:
      - attendee_network
    ports:
      - "8001:8000"
    environment:
      DJANGO_SETTINGS_MODULE: attendee.settings.development
      ENABLE_CHROME_SANDBOX: "true"
    command: "python bots/webpage_streamer/run_webpage_streamer.py"
    security_opt:
      - seccomp=./bots/web_bot_adapter/chrome_seccomp.json
    profiles:
      - webpage-streamer

networks:
  attendee_network:
    driver: bridge
