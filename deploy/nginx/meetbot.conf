map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream attendee_app {
    server app:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name meetbot.voxstudio.me;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name meetbot.voxstudio.me;

    ssl_certificate /etc/nginx/ssl/meetbot.voxstudio.me.crt;
    ssl_certificate_key /etc/nginx/ssl/meetbot.voxstudio.me.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 100m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    location / {
        proxy_pass http://attendee_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 3600s;
    }

    location /static/ {
        proxy_pass http://attendee_app/static/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_buffering on;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Access-Control-Allow-Origin "*";
    }
}

